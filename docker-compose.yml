# docker-compose.yml
version: "3.9"
services:
  api:
    build: ./backend
    container_name: skillsprint_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
  db:
    image: postgres:16-alpine
    container_name: skillsprint_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: skillsprint
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: skillsprint_redis
    ports:
      - "6379:6379"
volumes:
  pgdata:
    driver: local
